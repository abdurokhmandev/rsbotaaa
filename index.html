<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ro‘yxatdan o‘tish</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      background: #ffffff;
      color: #111;
    }

    .wrapper {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo img {
      width: 70px;
      margin-bottom: 10px;
    }

    h1 {
      color: #14c767;
    }

    p {
      color: #555;
      font-size: 14px;
    }

    .card {
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 15px;
    }

    .field {
      margin-bottom: 15px;
    }

    label {
      font-size: 13px;
      color: #14c767;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    input:focus, select:focus {
      border-color: #14c767;
      outline: none;
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background: #14c767;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn-submit:hover {
      opacity: 0.9;
    }

    .success {
      display: none;
      text-align: center;
      margin-top: 30px;
    }

    .success h2 {
      color: #14c767;
    }
    select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: white;
      font-size: 14px;
      cursor: pointer;
    }

    select:focus {
      border-color: #14c767;
      outline: none;
    }
  </style>
</head>
<body>

<div class="wrapper">

  <div class="header">
    <div class="logo">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQxcDz7QrdiDD4CZNuns2xG5cI75Wl8h06tQA&s" alt="logo">
    </div>
    <h1>Ro‘yxatdan o‘tish</h1>
    <p>Formani to‘ldiring (30 soniya vaqt oladi)</p>
  </div>

  <div class="card" id="formCard">
    <form id="form">

      <div class="field">
        <label>Ism Familiya</label>
        <input type="text" id="name" placeholder="Masalan: Abdulloh Rahimov" required>
      </div>

      <div class="field">
        <label>Telefon raqam</label>
        <input type="text" id="phone" placeholder="+998 90 000 00 00" required>
      </div>

      <div class="field">
        <label>Sinf</label>
        <select id="grade" required>
          <option value="">Tanlang</option>
          <option>1-sinf</option>
          <option>2-sinf</option>
          <option>3-sinf</option>
          <option>4-sinf</option>
          <option>5-sinf</option>
          <option>6-sinf</option>
          <option>7-sinf</option>
          <option>8-sinf</option>
          <option>9-sinf</option>
          <option>10-sinf</option>
          <option>11-sinf</option>
        </select>
      </div>

      <div class="field">
        <label>Hudud (tuman)</label>
        <select id="district" required>
          <option value="">Hududni tanlang</option>
          <option>Shayxontohur tumani</option>
          <option>Mirobod tumani</option>
          <option>Mirzo Ulug‘bek tumani</option>
          <option>Sergeli tumani</option>
          <option>Olmazor tumani</option>
          <option>Uchtepa tumani</option>
          <option>Bektemir tumani</option>
          <option>Yashnobod tumani</option>
          <option>Chilonzor tumani</option>
          <option>Yunusobod tumani</option>
          <option>Yakkasaroy tumani</option>
          <option>Boshqa viloyat</option>
        </select>
      </div>

      <div class="field">
        <label>Qayerdan bildingiz?</label>
        <select id="source" required>
          <option value="">Tanlang</option>
          <option>Telegram</option>
          <option>Instagram</option>
          <option>Do‘st orqali</option>
          <option>Boshqa</option>
        </select>
      </div>

      <button class="btn-submit" type="submit" id="submitBtn">
        Yuborish 🚀
      </button>

    </form>
  </div>

  <div class="success" id="success">
    <h2>✅ Muvaffaqiyatli!</h2>
    <p>Ma'lumot yuborildi</p>
  </div>

</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  const form = document.getElementById("form");
  const submitBtn = document.getElementById("submitBtn");

  form.addEventListener("submit", function(e){
    e.preventDefault();
    
    submitBtn.disabled = true;
    submitBtn.innerText = "Yuborilmoqda...";

    const user_id = tg.initDataUnsafe?.user?.id;

    const data = {
      user_id: user_id,
      name: document.getElementById("name").value,
      phone: document.getElementById("phone").value,
      grade: document.getElementById("grade").value,
      district: document.getElementById("district").value,
      source: document.getElementById("source").value,
    };

    fetch("https://botttttttt-production.up.railway.app/api/submit", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    }).then(response => response.json())
      .then(result => {
        if (result.ok) {
          document.getElementById("formCard").style.display = "none";
          document.getElementById("success").style.display = "block";
          
          setTimeout(() => {
            tg.close();
          }, 1500);
        } else {
          alert("Xatolik yuz berdi. Iltimos qayta urinib ko'ring.");
          submitBtn.disabled = false;
          submitBtn.innerText = "Yuborish 🚀";
        }
    }).catch(err => {
      alert("Xatolik yuz berdi: " + err);
      submitBtn.disabled = false;
      submitBtn.innerText = "Yuborish 🚀";
    });
  });
</script>

</body>
</html>
